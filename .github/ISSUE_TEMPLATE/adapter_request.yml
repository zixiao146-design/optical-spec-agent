name: Adapter request
description: Request or refine a solver input scaffold adapter.
title: "[Adapter] "
labels: ["adapter", "enhancement"]
body:
  - type: textarea
    id: solver
    attributes:
      label: Solver or tool
      description: Which solver/tool should the adapter target?
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Example optical task
      description: Include natural language input and expected scaffold type.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope acknowledgement
      options:
        - label: I understand adapters generate scaffold/input only unless explicitly documented otherwise.
          required: true
        - label: I am not requesting production physical validation in this issue.
          required: true
