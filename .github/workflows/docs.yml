name: Docs

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docs-and-contracts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]" build

      - name: Check docs consistency
        run: make docs-check

      - name: Check CLI surface
        run: make cli-check

      - name: Check artifact contracts
        run: make artifact-check
