name: Docs

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  docs-and-contracts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check docs consistency
        run: python scripts/check_docs_consistency.py

      - name: Check CLI surface
        run: python scripts/check_cli_surface.py

      - name: Check release readiness
        run: python scripts/check_release_readiness.py --report outputs/release_readiness_report.json

      - name: Check artifact contracts
        run: python scripts/check_artifact_contracts.py --report outputs/artifact_contract_report.json
