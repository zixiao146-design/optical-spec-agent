name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  local-quality-gates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]" build

      - name: Syntax smoke
        run: python -m compileall -q src scripts benchmarks

      - name: Run tests
        run: python -m pytest

      - name: Build distributions
        run: python -m build

      - name: CLI help
        run: optical-spec --help

      - name: CLI adapter list
        run: optical-spec adapter-list --json

      - name: CLI validate example
        run: optical-spec validate examples/specs/minimal_nanoparticle.json

      - name: CLI parse example
        run: optical-spec parse examples/specs/minimal_nanoparticle.json --json

      - name: CLI workflow plan example
        run: optical-spec workflow-plan examples/workflows/local_preview_request.json --json
